<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

         .tiktok_shadow {
            box-shadow: -3px 0px 0px #25F4EE, 3px 0px 0px #FE2C55;
        }

        .tiktok_textShadow {
            text-shadow:
                -2px 0px 0px #25F4EE,
                2px 0px 0px #FE2C55;
        }
        .bg_black{
            background: black;
            color: white;
        }

        h1 {
            font-size: 1.5em;
            font-weight: 600;
            text-align: center;
        }

        form {
            width: 275px;
            display: flex;
            justify-content: center;
            gap: 10px;
            /* flex-direction: column; */
            flex-wrap: wrap;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid black;

        }

        form input,
        form button {
            width: 70%;
            padding: 5px 15px;
            border-radius: 20px;

            border: none;
            background: rgba(0, 0, 0, 0.121);
        }

        form button {
            width: max-content;
        }
    </style>
</head>
<body>
    <form onsubmit="uploadId(this.id)" class="tiktok_shadow" id="tikTokId">
        <label for="tiktok">
            <h1 class="tiktok_textShadow">Share any TikTok ID</h1>
        </label>
        <input type="hidden" value="tiktok" name="app">
        <input type="text" name="idName" id="tiktok" placeholder="Enter TikTok ID Name">
        <button class="bg_black tiktok_shadow" type="submit">Save</button>
    </form>
    <script>
        function uploadId(form){
            $.ajax({
                url: 'PHP/idSaver.php',
                method: 'POST',
                data: $(`#${form}`).serialize(),
                success: (data => {
                    console.log(data);
                })
            })
        }
    </script>
</body>
</html>
